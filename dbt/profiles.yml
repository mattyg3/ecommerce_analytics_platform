clickstream:
  target: dev
  outputs:
    dev:
      type: spark
      method: session
      schema: "{{ env_var('DBT_TARGET_SCHEMA') }}"
      warehouse: "{{ env_var('DBT_TARGET_PATH') }}"
      host: localhost
      port: 443
      threads: 8
      # Session method uses server_side_parameters (not spark_conf) for SparkSession config
      server_side_parameters:
        spark.jars.packages: "io.delta:delta-spark_4.1_2.13:4.1.0"
        spark.sql.extensions: "io.delta.sql.DeltaSparkSessionExtension"
        spark.sql.catalog.spark_catalog: "org.apache.spark.sql.delta.catalog.DeltaCatalog"
        # Avoid OutOfMemoryError when writing Delta (local mode = single JVM)
        spark.driver.memory: "4g"
        spark.sql.shuffle.partitions: "50"