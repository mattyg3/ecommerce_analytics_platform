version: 2

sources:
  - name: bronze
    database: analytics
    schema: bronze
    tables:
      - name: clickstream
        description: "Raw clickstream events from streaming ingest"
      - name: orders
        description: "Raw orders from streaming ingest"

models:
  - name: stg_clickstream_events
    columns:
      - name: event_id
        tests: [not_null, unique]
      - name: event_ts
        tests: [not_null]

  - name: stg_orders
    columns:
      - name: order_id
        tests: [not_null, unique]
      - name: total_amount
        tests:
          - dbt_utils.expression_is_true:
              expression: "total_amount >= 0"