models:

  # ------------------------------------------------------------
  # STAGING (Silver)
  # ------------------------------------------------------------

  - name: stg_clickstream_events
    description: >
      Staging model for raw clickstream events.
      Grain is one row per event_id.
      This model performs light standardization and type casting
      and serves as the canonical cleaned event source for the silver layer.
    columns:
      - name: event_id
        description: Unique identifier for a single clickstream event.
        tests:
          - not_null
          - unique

      - name: event_ts
        description: Timestamp when the event occurred.
        tests:
          - not_null

  # ------------------------------------------------------------
  
  - name: stg_clickstream_sessions
    description: >
      Staging model for user sessions derived from clickstream activity.
      Grain is one row per session_id.
      Contains session timing and duration metrics prior to enrichment
      in downstream models.
    columns:
      - name: session_id
        description: Unique identifier for a user session.
        tests:
          - not_null
          - unique

      - name: session_start_ts
        description: Timestamp marking the beginning of the session.
        tests:
          - not_null

      - name: session_end_ts
        description: Timestamp marking the end of the session.
        tests:
          - not_null

      - name: session_duration_sec
        description: Total duration of the session in seconds.
        tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"

  # ------------------------------------------------------------
  
  - name: stg_orders
    description: >
      Staging model for customer orders.
      Grain is one row per order_id.
      Represents order-level transactional data with basic validation
      and type normalization applied.
    columns:
      - name: order_id
        description: Unique identifier for an order.
        tests:
          - not_null
          - unique

      - name: order_ts
        description: Timestamp when the order was created.
        tests:
          - not_null

      - name: order_total_amount
        description: Total monetary value of the order.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"

  # ------------------------------------------------------------

  - name: stg_order_items
    description: >
      Staging model for individual order line items.
      Grain is one row per (order_id, product_id).
      Provides normalized item-level purchase data for downstream
      aggregation and analytics.
    columns:
      - name: order_id
        description: Identifier of the order containing the item.
        tests:
          - not_null

      - name: product_id
        description: Identifier of the product purchased.
        tests:
          - not_null

      - name: quantity
        description: Number of units of the product purchased.
        tests:
          - dbt_utils.expression_is_true:
              expression: "> 0"

  # ------------------------------------------------------------
  # FACTS (Gold)
  # ------------------------------------------------------------

  - name: fact_events
    description: >
      Event-level fact table at grain of one row per event_id.
      Represents all user clickstream events after cleaning and normalization
      in the silver layer. Used for behavioral analysis and funnel construction.
    columns:
      - name: event_id
        description: Primary key. Uniquely identifies a single event.
        tests:
          - not_null
          - unique

      - name: event_ts
        description: Timestamp when the event occurred.
        tests:
          - not_null

      - name: event_date
        description: Event date derived from event_ts.
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date

      - name: event_type
        description: Type of user action (e.g. page_view, add_to_cart, checkout).
        tests:
          - not_null

      - name: user_id
        description: User who triggered the event.
        tests:
          - relationships:
              to: ref('dim_users')
              field: user_id

      - name: session_id
        description: Session during which the event occurred.
        tests:
          - not_null
          - relationships:
              to: ref('dim_session_context')
              field: session_id

  # ------------------------------------------------------------

  - name: fact_sessions
    description: >
      Session-level fact table at grain of one row per session_id.
      Aggregates user activity into sessions and enriches with conversion
      indicators such as has_order and revenue_in_session.
    columns:
      - name: session_id
        description: Primary key. Uniquely identifies a session.
        tests:
          - not_null
          - unique
          - relationships:
              to: ref('dim_session_context')
              field: session_id

      - name: user_id
        description: User associated with the session.
        tests:
          - not_null
          - relationships:
              to: ref('dim_users')
              field: user_id

      - name: session_start_ts
        description: Timestamp when the session started.
        tests:
          - not_null

      - name: session_end_ts
        description: Timestamp when the session ended.

      - name: session_duration_sec
        description: Length of the session in seconds.
        tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"

      - name: event_count
        description: Number of events recorded in the session.
        tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"

      - name: has_order
        description: Boolean flag indicating whether at least one order occurred in the session.
        tests:
          - not_null

      - name: orders_in_session
        description: Number of orders placed during the session.
        tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"

      - name: revenue_in_session
        description: Total revenue generated during the session.
        tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"

  # ------------------------------------------------------------

  - name: fact_orders
    description: >
      Order-level fact table at grain of one row per order_id.
      This table is the authoritative source of truth for revenue
      and completed purchase activity.
    columns:
      - name: order_id
        description: Primary key. Uniquely identifies an order.
        tests:
          - not_null
          - unique

      - name: user_id
        description: User who placed the order.
        tests:
          - not_null
          - relationships:
              to: ref('dim_users')
              field: user_id

      - name: session_id
        description: Session during which the order was placed.
        tests:
          - relationships:
              to: ref('dim_session_context')
              field: session_id

      - name: order_ts
        description: Timestamp when the order was created.
        tests:
          - not_null

      - name: order_date
        description: Date derived from order_ts.
        tests:
          - not_null

      - name: order_status
        description: Current status of the order (e.g. completed, cancelled).
        tests:
          - not_null

      - name: item_count
        description: Number of items in the order.
        tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"

      - name: order_total_amount
        description: Total monetary value of the order.
        tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"

  # ------------------------------------------------------------

  - name: fact_order_items
    description: >
      Line-item–level fact table at grain of one row per
      (order_id, product_id). Enables product performance,
      basket analysis, and pricing analytics.
    columns:
      - name: order_id
        description: Order associated with the line item.
        tests:
          - not_null
          - relationships:
              to: ref('fact_orders')
              field: order_id

      - name: product_id
        description: Product included in the order.
        tests:
          - not_null
          - relationships:
              to: ref('dim_products')
              field: product_id

      - name: quantity
        description: Quantity of the product purchased.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: "> 0"

      - name: price
        description: Unit price of the product at time of purchase.
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"

      - name: line_amount
        description: Total amount for the line item (quantity * price).
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"

      - name: order_ts
        description: Timestamp when the order was placed.
        tests:
          - not_null

  # ------------------------------------------------------------
  # DIMENSIONS (Gold)
  # ------------------------------------------------------------

  - name: dim_users
    description: >
      User dimension table at grain of one row per user_id.
      Contains user lifecycle attributes and aggregated behavioral
      and revenue metrics derived from events and orders.
    columns:
      - name: user_id
        description: Primary key. Uniquely identifies a user.
        tests:
          - not_null
          - unique

      - name: first_seen_ts
        description: Timestamp of the user's first recorded event.

      - name: last_seen_ts
        description: Timestamp of the user's most recent recorded event.

      - name: first_order_ts
        description: Timestamp of the user's first completed order.

      - name: total_orders
        description: Total number of orders placed by the user.
        tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"

      - name: lifetime_revenue
        description: Total revenue generated by the user across all orders.
        tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"

  # ------------------------------------------------------------

  - name: dim_products
    description: >
      Product dimension table at grain of one row per product_id.
      Provides aggregated sales performance metrics derived from
      order line items.
    columns:
      - name: product_id
        description: Primary key. Uniquely identifies a product.
        tests:
          - not_null
          - unique

      - name: first_sold_ts
        description: Timestamp when the product was first sold.

      - name: total_units_sold
        description: Total quantity of units sold for the product.
        tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"

      - name: total_revenue
        description: Total revenue generated by the product.
        tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"

  # ------------------------------------------------------------

  - name: dim_date
    description: >
      Date dimension table at grain of one row per calendar date.
      Generated dynamically based on the range of event dates
      present in the fact tables and used for time-based analysis.
    columns:
      - name: date
        description: Primary key. Calendar date.
        tests:
          - not_null
          - unique

      - name: day
        description: Day of the month (1–31).

      - name: week
        description: ISO week of year.

      - name: month
        description: Month of year (1–12).

      - name: quarter
        description: Calendar quarter (1–4).

      - name: year
        description: Calendar year.

      - name: is_weekend
        description: Boolean flag indicating whether the date falls on a weekend.
        tests:
          - not_null

  # ------------------------------------------------------------

  - name: dim_session_context
    description: >
      Session context dimension at grain of one row per session_id.
      Captures acquisition and environment attributes for a session
      based on the earliest event in the session.
    columns:
      - name: session_id
        description: Primary key. Uniquely identifies a session.
        tests:
          - not_null
          - unique

      - name: country
        description: Country associated with the session.

      - name: device
        description: Device type used during the session.

      - name: referrer
        description: Referring source for the session.

      - name: source_system
        description: Originating system that produced the session data.

  # ============================================================
  # DAILY KPIs
  # ============================================================

  - name: metrics_daily_kpis
    description: |
      Daily business KPI rollups at a one-row-per-date grain.
      This table is intended for executive dashboards and high-level monitoring.
      Metrics are derived from session and order fact tables.

      Grain: one row per date
    columns:
      - name: date
        description: Calendar date
        tests:
          - not_null
          - unique

      - name: daily_active_users
        description: Count of distinct users with at least one session on the date
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"

      - name: sessions
        description: Total number of sessions started on the date
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"

      - name: orders
        description: Number of completed orders placed on the date
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"

      - name: revenue
        description: Total gross revenue from orders placed on the date
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"

      - name: avg_order_value
        description: Average revenue per order on the date
        tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"

      - name: conversion_rate
        description: Orders divided by total sessions for the date

      - name: sessions_with_order_pct
        description: Percentage of sessions that resulted in at least one order


  # ============================================================
  # DAILY FUNNEL
  # ============================================================

  - name: metrics_daily_funnel
    description: |
      Daily session-level funnel metrics showing user progression
      through key behavioral steps (view → add to cart → checkout → order).

      Grain: one row per date
    columns:
      - name: date
        description: Calendar date
        tests:
          - not_null
          - unique

      - name: sessions
        description: Total number of sessions on the date
        tests:
          - not_null

      - name: sessions_with_product_view
        description: Sessions with at least one product view event
        tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"

      - name: sessions_with_add_to_cart
        description: Sessions with at least one add-to-cart event
        tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"

      - name: sessions_with_checkout
        description: Sessions that reached checkout
        tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"

      - name: sessions_with_order
        description: Sessions that resulted in at least one order
        tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"


  # ============================================================
  # USER LIFECYCLE
  # ============================================================

  - name: metrics_user_lifecycle
    description: |
      User-level lifecycle metrics capturing acquisition, conversion,
      and lifetime value behavior.

      Grain: one row per user
    columns:
      - name: user_id
        description: Unique user identifier
        tests:
          - not_null
          - unique
          - relationships:
              to: ref('dim_users')
              field: user_id

      - name: first_seen_date
        description: Date of the user's first recorded session
        tests:
          - not_null

      - name: first_order_date
        description: Date of the user's first completed order

      - name: days_to_first_purchase
        description: Number of days between first session and first order
        tests:
          - dbt_utils.expression_is_true:
              column_name: days_to_first_purchase
              expression: "is null or days_to_first_purchase >= 0"

      - name: total_sessions
        description: Total number of sessions across the user's lifetime
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"

      - name: total_orders
        description: Total number of completed orders placed by the user
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"

      - name: lifetime_revenue
        description: Total lifetime revenue generated by the user
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"

      - name: avg_order_value
        description: Average order value across the user's lifetime
        tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"

      - name: is_repeat_buyer
        description: True if the user has placed more than one order


  # ============================================================
  # PRODUCT PERFORMANCE (DAILY)
  # ============================================================

  - name: metrics_product_performance_daily
    description: |
      Daily product performance metrics combining sales and engagement data.
      Used for merchandising analysis and product-level reporting.

      Grain: one row per date per product
    columns:
      - name: date
        description: Calendar date
        tests:
          - not_null

      - name: product_id
        description: Unique product identifier
        tests:
          - not_null
          - relationships:
              to: ref('dim_products')
              field: product_id

      - name: units_sold
        description: Total quantity of units sold for the product on the date
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"

      - name: orders_with_product
        description: Number of distinct orders containing the product
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"

      - name: product_revenue
        description: Total revenue generated by the product on the date
        tests:
          - not_null
          - dbt_utils.expression_is_true:
              expression: ">= 0"

      - name: avg_price
        description: Average selling price of the product on the date
        tests:
          - dbt_utils.expression_is_true:
              expression: ">= 0"

      - name: product_conversion_rate
        description: |
          Orders containing the product divided by sessions that viewed
          the product on the date