version: 2

exposures:

  # ============================================================
  # KPI Dashboard
  # ============================================================
  - name: kpi_dashboard
    type: dashboard
    depends_on:
      - ref('metrics_daily_kpis')
    description: |
      Daily KPI dashboard for executives showing overall business health:
      - Active users
      - Sessions
      - Orders
      - Revenue
      - Conversion rates
    owner:
      name: "Data Analytics Team"
      email: "analytics@example.com"
    url: ""
    maturity: high

  # ============================================================
  # Funnel Dashboard
  # ============================================================
  - name: funnel_dashboard
    type: dashboard
    depends_on:
      - ref('metrics_daily_funnel')
    description: |
      Funnel dashboard showing user behavior progression through the site:
      - Product views
      - Add-to-cart
      - Checkout
      - Orders
    owner:
      name: "Growth Analytics Team"
      email: "growth@example.com"
    url: ""
    maturity: medium

  # ============================================================
  # User Lifecycle Dashboard
  # ============================================================
  - name: user_lifecycle_dashboard
    type: dashboard
    depends_on:
      - ref('metrics_user_lifecycle')
    description: |
      User lifecycle dashboard tracking acquisition, first purchase,
      repeat purchase, and lifetime value metrics per user cohort.
    owner:
      name: "CRM / Retention Analytics"
      email: "retention@example.com"
    url: ""
    maturity: medium
  # ============================================================
  # Product Performance Dashboard
  # ============================================================
  - name: product_performance_dashboard
    type: dashboard
    depends_on:
      - ref('metrics_product_performance_daily')
    description: |
      Daily product performance dashboard for merchandising and product management:
      - Units sold
      - Orders containing product
      - Revenue per product
      - Product conversion rates
    owner:
      name: "Merchandising Team"
      email: "merchandising@example.com"
    url: ""
    maturity: medium