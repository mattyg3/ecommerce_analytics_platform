
services:
  spark-dbt:
    # user: "${UID}:${GID}"
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: ${UID}
        GID: ${GID}

    container_name: spark-dbt

    volumes:
      - .:/app
      - ./data-lake:/data-lake

    working_dir: /app

    stdin_open: true
    tty: true

    environment:
      - PYTHONUNBUFFERED=1

    command: bash